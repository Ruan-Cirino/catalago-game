<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Catalogo Gamer</title>
  <link rel="stylesheet" href="css/login.css" />
</head>

<body>
  <main class="login-page">
    <section class="login-card">
      <div class="brand">
        <span class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm0 1c-2.33 0-7 1.17-7 3.5V14h14v-1.5C15 10.17 10.33 9 8 9z" />
          </svg>
        </span>
        <div>
          <h1>Catalogo Gamer</h1>
          <p>Entre para acessar seu catalogo de jogos gratuitos.</p>
        </div>
      </div>

      <form id="loginForm">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome" required />

        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seuemail@exemplo.com" required />

        <button type="submit">Entrar</button>
        <p id="mensagemErro" class="erro"></p>
      </form>
    </section>
  </main>

  <script src="js/login.js"></script>
</body>

</html>
